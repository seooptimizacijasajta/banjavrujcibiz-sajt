backend:
  name: github
  repo: seooptimizacijasajta/banjavrujcibiz-sajt
  branch: main

# OAuth handshake je implementiran kao Vercel serverless funkcije u /api/auth.js
# i /api/callback.js (isti domen kao sajt, GitHub OAuth App).
# Potrebno je u Vercel projektu podesiti env varijable OAUTH_CLIENT_ID i
# OAUTH_CLIENT_SECRET (iz GitHub OAuth App podešavanja: Settings > Developer
# settings > OAuth Apps > New OAuth App; Authorization callback URL mora biti
# https://www.banjavrujci.biz/api/callback).
base_url: https://www.banjavrujci.biz
auth_endpoint: api/auth

media_folder: "src/uploads"
public_folder: "/uploads"

publish_mode: simple

collections:
  - name: "vile"
    label: "Vile"
    folder: "src/smestaj/vile"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Naslov", name: "title", widget: "string" }
      - { label: "Objavljeno", name: "published", widget: "boolean", default: true }
      - { label: "Telefon", name: "telefon", widget: "string", required: false }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Slike", name: "slike", widget: "list", field: { label: "Slika", name: "slika", widget: "image" }, required: false }
      - { label: "Opis", name: "body", widget: "markdown" }
      - { label: "Kategorija", name: "kategorija", widget: "hidden", default: "vile" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/smestaj-item.njk" }

  - name: "apartmani"
